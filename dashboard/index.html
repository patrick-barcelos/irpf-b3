<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRPF 2026 - Dashboard Consolidado</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [data, setData] = useState({ usuario: {}, ativos: [], proventos: [] });
            
            useEffect(() => {
                fetch('data.json')
                    .then(res => res.json())
                    .then(json => setData(json))
                    .catch(err => console.error(err));
            }, []);

            return (
                <div class="min-h-screen p-6 max-w-6xl mx-auto">
                    <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div>
                            <h1 class="text-2xl font-black text-slate-800 tracking-tight">IRPF <span class="text-indigo-600">2026</span></h1>
                            <p class="text-slate-400 text-sm">Organização por Fichas da Receita Federal</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-slate-700">{data.usuario.nome}</p>
                            <p class="text-xs text-slate-400">CPF: {data.usuario.cpf}</p>
                        </div>
                    </header>

                    {/* SEÇÃO 1: BENS E DIREITOS */}
                    <Section title="Ficha: Bens e Direitos" icon="fa-vault" color="bg-indigo-600">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="p-4">Ativo</th>
                                    <th class="p-4">Qtd 2024</th>
                                    <th class="p-4 text-right">Saldo 2024</th>
                                    <th class="p-4">Qtd 2025</th>
                                    <th class="p-4 text-right">Saldo 2025</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                {data.ativos.map(a => (
                                    <tr key={a.ticker} class="hover:bg-indigo-50/20">
                                        <td class="p-4"><span class="font-bold text-indigo-700">{a.ticker}</span><br/><small class="text-slate-400">{a.nome.slice(0,40)}</small></td>
                                        <td class="p-4 text-slate-500">{a.q24}</td>
                                        <td class="p-4 text-right font-medium text-slate-600">R$ {a.v24.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                        <td class="p-4 font-bold text-slate-700">{a.q25}</td>
                                        <td class="p-4 text-right font-black text-slate-800 text-base">R$ {a.v25.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </Section>

                    {/* SEÇÃO 2: RENDIMENTOS ISENTOS */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <Section title="Ficha: Rendimentos Isentos (Dividendos/FIIs)" icon="fa-hand-holding-heart" color="bg-emerald-500">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase">
                                    <tr><th class="p-4">Ativo</th><th class="p-4 text-right">Valor Recebido</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    {data.proventos.filter(p => p.dividendos > 0).map(p => (
                                        <tr key={p.ticker}><td class="p-4 font-bold text-slate-700">{p.ticker}</td><td class="p-4 text-right text-emerald-600 font-bold">R$ {p.dividendos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td></tr>
                                    ))}
                                </tbody>
                            </table>
                        </Section>

                        <Section title="Ficha: Tributação Exclusiva (JCP)" icon="fa-percent" color="bg-orange-500">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase">
                                    <tr><th class="p-4">Ativo</th><th class="p-4 text-right">Valor Líquido</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    {data.proventos.filter(p => p.jcp > 0).map(p => (
                                        <tr key={p.ticker}><td class="p-4 font-bold text-slate-700">{p.ticker}</td><td class="p-4 text-right text-orange-600 font-bold">R$ {p.jcp.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td></tr>
                                    ))}
                                </tbody>
                            </table>
                        </Section>
                    </div>
                </div>
            );
        };

        const Section = ({ title, icon, color, children }) => (
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
                <div class="p-4 flex items-center gap-3 border-b border-slate-50">
                    <div class={`${color} p-2 rounded-lg text-white w-10 h-10 flex items-center justify-center`}><i class={`fa ${icon}`}></i></div>
                    <h2 class="font-black text-slate-700 tracking-tight">{title}</h2>
                </div>
                <div class="overflow-x-auto">{children}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
