<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRPF 2026 - Dashboard Consolidado</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .copy-feedback { animation: fadeUp 0.8s ease-out forwards; pointer-events: none; }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translate(-50%, 0); }
            20% { opacity: 1; transform: translate(-50%, -20px); }
            80% { opacity: 1; transform: translate(-50%, -20px); }
            100% { opacity: 0; transform: translate(-50%, -40px); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [data, setData] = useState({ usuario: {}, ativos: [], proventos: [] });
            const [searchTerm, setSearchTerm] = useState("");
            const [copyFeedback, setCopyFeedback] = useState(null);
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('irpf_checked_items');
                return saved ? JSON.parse(saved) : {};
            });
            
            useEffect(() => {
                fetch('data.json').then(res => res.json()).then(json => setData(json)).catch(err => console.error(err));
            }, []);

            useEffect(() => {
                localStorage.setItem('irpf_checked_items', JSON.stringify(checkedItems));
            }, [checkedItems]);

            const toggleCheck = (id) => { setCheckedItems(prev => ({ ...prev, [id]: !prev[id] })); };

            const copyToClipboard = (text, e) => {
                navigator.clipboard.writeText(text);
                setCopyFeedback({ x: e.clientX, y: e.clientY, text: "Copiado!" });
                setTimeout(() => setCopyFeedback(null), 800);
            };

            const filteredAtivos = useMemo(() => {
                return data.ativos.filter(a => a.ticker.toLowerCase().includes(searchTerm.toLowerCase()) || a.nome.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [data.ativos, searchTerm]);

            const filteredProventos = useMemo(() => {
                return data.proventos.filter(p => p.ticker.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [data.proventos, searchTerm]);

            return (
                <div class="min-h-screen p-6 max-w-7xl mx-auto">
                    {copyFeedback && <div className="fixed z-[9999] bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow-xl copy-feedback" style={{ left: copyFeedback.x, top: copyFeedback.y }}>{copyFeedback.text}</div>}

                    <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
                        <div><h1 class="text-2xl font-black text-slate-800 tracking-tight">IRPF <span class="text-indigo-600">2026</span></h1><p class="text-slate-400 text-[10px] mt-1 font-black tracking-widest uppercase">Investimentos Dashboard</p></div>
                        <div class="relative w-full md:w-96"><i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" placeholder="Buscar ticker ou nome..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                        <div class="text-right hidden md:block text-xs font-bold text-slate-700 uppercase tracking-tighter cursor-pointer hover:text-indigo-600" onClick={(e) => copyToClipboard(data.usuario.nome, e)}>{data.usuario.nome}<br/><span class="text-slate-400 font-black">CPF: {data.usuario.cpf}</span></div>
                    </header>

                    <Section title="Bens e Direitos" icon="fa-vault" color="bg-indigo-600">
                        <table class="w-full text-xs text-left">
                            <thead class="bg-slate-50 text-slate-400 uppercase font-black tracking-widest">
                                <tr>
                                    <th class="p-4">Ativo</th>
                                    <th class="p-4 text-center">Qtd 24</th>
                                    <th class="p-4 text-right">Saldo 24</th>
                                    <th class="p-4 text-center">Qtd 25</th>
                                    <th class="p-4 text-right">Saldo 25</th>
                                    <th class="p-4 text-center text-indigo-600 bg-indigo-50">Preço Médio</th>
                                    <th class="p-4 text-center w-16">Ok</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                {filteredAtivos.map(a => (
                                    <tr key={a.ticker} class={`transition-all ${checkedItems[a.ticker] ? 'bg-emerald-50/40 opacity-60' : 'hover:bg-indigo-50/20'}`}>
                                        <td class="p-4"><span class={`font-black cursor-pointer ${checkedItems[a.ticker] ? 'line-through text-slate-400' : 'text-indigo-900'}`} onClick={(e) => copyToClipboard(a.ticker, e)}>{a.ticker}</span><br/><small class="text-slate-400 cursor-pointer" onClick={(e) => copyToClipboard(a.nome, e)}>{a.nome.slice(0,50)}</small></td>
                                        <td class="p-4 text-center text-slate-500">{a.q24}</td>
                                        <td class="p-4 text-right font-mono text-slate-500 cursor-pointer" onClick={(e) => copyToClipboard(a.v24.toFixed(2).replace('.',','), e)}>R$ {a.v24.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                                        <td class="p-4 text-center font-bold text-slate-700">{a.q25}</td>
                                        <td class="p-4 text-right font-black text-slate-900 cursor-pointer" onClick={(e) => copyToClipboard(a.v25.toFixed(2).replace('.',','), e)}>R$ {a.v25.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                                        <td class="p-4 text-center font-black text-indigo-700 bg-indigo-50/30 cursor-pointer" onClick={(e) => copyToClipboard(a.pm25.toFixed(4).replace('.',','), e)}>R$ {a.pm25.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:4})}</td>
                                        <td class="p-4 text-center"><input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-indigo-600 cursor-pointer" checked={!!checkedItems[a.ticker]} onChange={() => toggleCheck(a.ticker)} /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </Section>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                        <Section title="Rendimentos Isentos" icon="fa-hand-holding-heart" color="bg-emerald-500">
                            <table class="w-full text-xs">
                                <thead class="bg-slate-50 text-slate-400 uppercase font-black tracking-widest"><tr><th class="p-4">Ativo</th><th class="p-4 text-right">Valor</th><th class="p-4 text-center w-16">Ok</th></tr></thead>
                                <tbody class="divide-y divide-slate-100">
                                    {filteredProventos.filter(p => p.dividendos > 0).map(p => (
                                        <tr key={`div-${p.ticker}`} class={checkedItems[`div-${p.ticker}`] ? 'bg-emerald-50/50 opacity-60' : ''}>
                                            <td class="p-4 font-bold cursor-pointer" onClick={(e) => copyToClipboard(p.ticker, e)}>{p.ticker}</td>
                                            <td class="p-4 text-right text-emerald-600 font-black cursor-pointer" onClick={(e) => copyToClipboard(p.dividendos.toFixed(2).replace('.',','), e)}>R$ {p.dividendos.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                                            <td class="p-4 text-center"><input type="checkbox" checked={!!checkedItems[`div-${p.ticker}`]} onChange={() => toggleCheck(`div-${p.ticker}`)} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </Section>

                        <Section title="Tributação Exclusiva (JCP)" icon="fa-percent" color="bg-orange-500">
                            <table class="w-full text-xs">
                                <thead class="bg-slate-50 text-slate-400 uppercase font-black tracking-widest"><tr><th class="p-4">Ativo</th><th class="p-4 text-right">Valor</th><th class="p-4 text-center w-16">Ok</th></tr></thead>
                                <tbody class="divide-y divide-slate-100">
                                    {filteredProventos.filter(p => p.jcp > 0).map(p => (
                                        <tr key={`jcp-${p.ticker}`} class={checkedItems[`jcp-${p.ticker}`] ? 'bg-orange-50/50 opacity-60' : ''}>
                                            <td class="p-4 font-bold cursor-pointer" onClick={(e) => copyToClipboard(p.ticker, e)}>{p.ticker}</td>
                                            <td class="p-4 text-right text-orange-600 font-black cursor-pointer" onClick={(e) => copyToClipboard(p.jcp.toFixed(2).replace('.',','), e)}>R$ {p.jcp.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                                            <td class="p-4 text-center"><input type="checkbox" checked={!!checkedItems[`jcp-${p.ticker}`]} onChange={() => toggleCheck(`jcp-${p.ticker}`)} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </Section>
                    </div>
                </div>
            );
        };

        const Section = ({ title, icon, color, children }) => (
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
                <div class="p-4 flex items-center gap-3 border-b border-slate-50"><div class={`${color} p-2 rounded-xl text-white w-10 h-10 flex items-center justify-center shadow-lg shadow-current/10`}><i class={`fa ${icon}`}></i></div><h2 class="font-black text-slate-800 uppercase text-xs tracking-tight">{title}</h2></div>
                <div class="overflow-x-auto">{children}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
