<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRPF 2026 - Dashboard Consolidado</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [data, setData] = useState({ usuario: {}, ativos: [], proventos: [] });
            const [searchTerm, setSearchTerm] = useState("");
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('irpf_checked_items');
                return saved ? JSON.parse(saved) : {};
            });
            
            useEffect(() => {
                fetch('data.json')
                    .then(res => res.json())
                    .then(json => setData(json))
                    .catch(err => console.error(err));
            }, []);

            useEffect(() => {
                localStorage.setItem('irpf_checked_items', JSON.stringify(checkedItems));
            }, [checkedItems]);

            const toggleCheck = (id) => {
                setCheckedItems(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            const filteredAtivos = useMemo(() => {
                return data.ativos.filter(a => 
                    a.ticker.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    a.nome.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [data.ativos, searchTerm]);

            const filteredProventos = useMemo(() => {
                return data.proventos.filter(p => 
                    p.ticker.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [data.proventos, searchTerm]);

            return (
                <div class="min-h-screen p-6 max-w-6xl mx-auto">
                    <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div>
                                <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">IRPF <span class="text-indigo-600">2026</span></h1>
                                <p class="text-slate-400 text-xs mt-1 uppercase font-bold tracking-widest">Dashboard de Investimentos</p>
                            </div>
                        </div>

                        <div class="relative w-full md:w-96">
                            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input 
                                type="text" 
                                placeholder="Buscar ticker ou nome nas 3 fichas..." 
                                class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-sm font-medium"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <div class="text-right hidden md:block">
                            <p class="font-bold text-slate-700 text-sm">{data.usuario.nome}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-black tracking-tighter">CPF: {data.usuario.cpf}</p>
                        </div>
                    </header>

                    {/* SEÇÃO 1: BENS E DIREITOS */}
                    <Section title="Ficha: Bens e Direitos" icon="fa-vault" color="bg-indigo-600">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="p-4">Ativo</th>
                                    <th class="p-4 text-right">Saldo 2024</th>
                                    <th class="p-4 text-right">Saldo 2025</th>
                                    <th class="p-4 text-center w-20">Feito?</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                {filteredAtivos.map(a => (
                                    <tr key={a.ticker} class={`transition-colors ${checkedItems[a.ticker] ? 'bg-emerald-50/50' : 'hover:bg-indigo-50/20'}`}>
                                        <td class="p-4">
                                            <span class={`font-bold ${checkedItems[a.ticker] ? 'text-slate-400 line-through' : 'text-indigo-700'}`}>{a.ticker}</span>
                                            <br/><small class="text-slate-400">{a.nome.slice(0,50)}</small>
                                        </td>
                                        <td class="p-4 text-right font-medium text-slate-500">R$ {a.v24.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                        <td class="p-4 text-right font-black text-slate-800 text-base">R$ {a.v25.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                        <td class="p-4 text-center">
                                            <input 
                                                type="checkbox" 
                                                class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer"
                                                checked={!!checkedItems[a.ticker]}
                                                onChange={() => toggleCheck(a.ticker)}
                                            />
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filteredAtivos.length === 0 && <EmptyState />}
                    </Section>

                    {/* PROVENTOS */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                        {/* RENDIMENTOS ISENTOS */}
                        <Section title="Rendimentos Isentos (Div/FII)" icon="fa-hand-holding-heart" color="bg-emerald-500">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase">
                                    <tr><th class="p-4">Ativo</th><th class="p-4 text-right">Valor</th><th class="p-4 text-center w-16">Ok</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    {filteredProventos.filter(p => p.dividendos > 0).map(p => (
                                        <tr key={`div-${p.ticker}`} class={checkedItems[`div-${p.ticker}`] ? 'bg-emerald-50/30 text-slate-400' : ''}>
                                            <td class="p-4 font-bold">{p.ticker}</td>
                                            <td class="p-4 text-right text-emerald-600 font-bold">R$ {p.dividendos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                            <td class="p-4 text-center">
                                                <input type="checkbox" checked={!!checkedItems[`div-${p.ticker}`]} onChange={() => toggleCheck(`div-${p.ticker}`)} />
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filteredProventos.filter(p => p.dividendos > 0).length === 0 && <EmptyState mini />}
                        </Section>

                        {/* TRIBUTAÇÃO EXCLUSIVA */}
                        <Section title="Tributação Exclusiva (JCP)" icon="fa-percent" color="bg-orange-500">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase">
                                    <tr><th class="p-4">Ativo</th><th class="p-4 text-right">Valor</th><th class="p-4 text-center w-16">Ok</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    {filteredProventos.filter(p => p.jcp > 0).map(p => (
                                        <tr key={`jcp-${p.ticker}`} class={checkedItems[`jcp-${p.ticker}`] ? 'bg-orange-50/30 text-slate-400' : ''}>
                                            <td class="p-4 font-bold">{p.ticker}</td>
                                            <td class="p-4 text-right text-orange-600 font-bold">R$ {p.jcp.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                                            <td class="p-4 text-center">
                                                <input type="checkbox" checked={!!checkedItems[`jcp-${p.ticker}`]} onChange={() => toggleCheck(`jcp-${p.ticker}`)} />
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filteredProventos.filter(p => p.jcp > 0).length === 0 && <EmptyState mini />}
                        </Section>
                    </div>
                </div>
            );
        };

        const Section = ({ title, icon, color, children }) => (
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-6">
                <div class="p-4 flex items-center gap-3 border-b border-slate-50">
                    <div class={`${color} p-2 rounded-lg text-white w-10 h-10 flex items-center justify-center`}><i class={`fa ${icon}`}></i></div>
                    <h2 class="font-black text-slate-700 tracking-tight uppercase text-xs">{title}</h2>
                </div>
                <div class="overflow-x-auto">{children}</div>
            </div>
        );

        const EmptyState = ({ mini }) => (
            <div class={`${mini ? 'p-8' : 'p-20'} text-center text-slate-300`}>
                <i class={`fa fa-search ${mini ? 'text-xl' : 'text-4xl'} mb-3`}></i>
                <p class="text-xs font-bold uppercase tracking-widest">Nada encontrado</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
